name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # أضف هذا عشان تقدر تشغل يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # لو index.html في الروت

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    # شرط مهم: يشتغل مرة واحدة فقط
    if: github.ref == 'refs/heads/main'
    
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # ← غيرت من v5 إلى v4
