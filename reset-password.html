<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور - شطرنج</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #c9a84c;
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #fff;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #c9a84c;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #c9a84c;
      border: none;
      border-radius: 8px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #b8963b;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
    }
    .success {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }
    .error {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.3);
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #c9a84c;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>إعادة تعيين كلمة المرور</h1>
    <div id="reset-form">
      <div class="form-group">
        <label>كلمة المرور الجديدة (6+ حرف)</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور الجديدة">
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="confirm-password" placeholder="أعد إدخال كلمة المرور">
      </div>
      <button onclick="resetPassword()" id="submit-btn">إعادة تعيين</button>
    </div>
    <div id="message" class="message" style="display: none;"></div>
    <div class="back-link">
      <a href="index.html">← العودة للعبة</a>
    </div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showMessage('رابط إعادة التعيين غير صالح أو منتهي الصلاحية', 'error');
      document.getElementById('reset-form').style.display = 'none';
    }

    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
      messageEl.style.display = 'block';
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const submitBtn = document.getElementById('submit-btn');

      if (!password || password.length < 6) {
        showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('كلمات المرور غير متطابقة', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري المعالجة...';

      try {
        // Load API URL
        const urlRes = await fetch('https://raw.githubusercontent.com/12362aa/chess/main/url.json');
        const urlData = await urlRes.json();
        const API_BASE = urlData.url.replace(/\/+$/, '') + '/api';

        const response = await fetch(API_BASE + '/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('تم إعادة تعيين كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول.', 'success');
          document.getElementById('reset-form').style.display = 'none';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3000);
        } else {
          showMessage(data.error || 'فشل إعادة تعيين كلمة المرور', 'error');
        }
      } catch (error) {
        showMessage('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'إعادة تعيين';
      }
    }
  </script>
</body>
</html>
