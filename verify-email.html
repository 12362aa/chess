<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التحقق من الإيميل - شطرنج</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    h1 {
      color: #c9a84c;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .message {
      color: #fff;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .success {
      color: #4caf50;
    }
    .error {
      color: #f44336;
    }
    .back-link {
      margin-top: 20px;
    }
    .back-link a {
      color: #c9a84c;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>التحقق من الإيميل</h1>
    <div id="message" class="message">جاري التحقق...</div>
    <div class="back-link">
      <a href="index.html">← العودة للعبة</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    async function verifyEmail() {
      const messageEl = document.getElementById('message');

      if (!token) {
        messageEl.textContent = 'رابط التحقق غير صالح أو منتهي الصلاحية';
        messageEl.className = 'message error';
        return;
      }

      try {
        const urlRes = await fetch('https://raw.githubusercontent.com/12362aa/chess/main/url.json');
        const urlData = await urlRes.json();
        const API_BASE = urlData.url.replace(/\/+$/, '') + '/api';

        const response = await fetch(API_BASE + '/auth/verify-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (response.ok) {
          messageEl.textContent = 'تم التحقق من إيميلك بنجاح! يمكنك الآن تسجيل الدخول.';
          messageEl.className = 'message success';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3000);
        } else {
          messageEl.textContent = data.error || 'فشل التحقق من الإيميل';
          messageEl.className = 'message error';
        }
      } catch (error) {
        messageEl.textContent = 'حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.';
        messageEl.className = 'message error';
      }
    }

    verifyEmail();
  </script>
</body>
</html>
